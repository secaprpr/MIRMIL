General:
    MODEL_NAME: PSA_MIL
    seed: 2024
    num_classes: 2
    num_epochs: 5
    device: 0
    num_workers: 4
    best_model_metric: macro_auc
    earlystop:
        use: False
        patience: 5
        metric: macro_auc

Dataset:
    DATASET_NAME: CAMELYON_CONCH
    dataset_csv_path: /data_sde/zbr/MIL_BASELINE/datasets/CAMELYON_CONCH_split.csv
    dataset_root_dir: {}
    # PSA_MIL uses spatial priors. Prefer .h5 with coords or .pt dicts containing coords.
    balanced_sampler:
        use: False
        replacement: True

Logs:
    log_root_dir: /data_sde/zbr/MIL_BASELINE/logs

Model:
    in_dim: 512  # Check the real CONCH feature dim on the server; override with --options Model.in_dim=...
    attn_dim: 192
    num_heads: 3
    depth: 1
    num_layers_adapter: 2
    patch_drop_rate: 0.0
    qkv_bias: True
    pool_type: attention  # Original PSA configs use attention pooling
    mlp_ratio: 4.0
    decay_type: Gaussian
    decay_clip: 0.001
    min_local_k: 1
    max_local_k: 25
    init_k: 7
    max_instances: 4096  # PSA builds an N x N distance matrix; lower to 2048/1024 if CUDA OOM occurs.
    sampling: uniform  # uniform, random, or head
    eval_sampling: uniform
    dropout: 0.1
    act: relu
    optimizer:
        which: adam
        adam_config:
            lr: 0.0001
            weight_decay: 0.00005
        adamw_config:
            lr: 0.0001
            weight_decay: 0.00005
    criterion: ce
    scheduler:
        warmup: 2
        which: step
        step_config:
            step_size: 3
            gamma: 0.9
        multi_step_config:
            milestones: [20, 30, 40]
            gamma: 0.9
        exponential_config:
            gamma: 0.9
        cosine_config:
            T_max: 10
            eta_min: 0.0001

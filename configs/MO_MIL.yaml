General:
    MODEL_NAME: MO_MIL
    seed: 2024
    num_classes: 2
    num_epochs: 5
    device: 0
    num_workers: 4
    best_model_metric: macro_auc
    earlystop:
        use: False
        patience: 5
        metric: macro_auc

Dataset:
    DATASET_NAME: CAMELYON_CONCH
    dataset_csv_path: /data_sde/zbr/MIL_BASELINE/datasets/CAMELYON_CONCH_split.csv
    dataset_root_dir: {}
    balanced_sampler:
        use: False
        replacement: True

Logs:
    log_root_dir: /data_sde/zbr/MIL_BASELINE/logs

Model:
    in_dim: 512  # Check the real CONCH feature dim on the server; override with --options Model.in_dim=...
    hidden_dim: 512
    dropout: 0.25
    act: gelu
    first_order_attn_hidden: 128
    second_order_type: multi_order_sequence  # multi_order_sequence follows released MoMIL; self_attn is a PyTorch ablation
    second_order_layers: 2
    layer: 2
    num_heads: 4
    fusion_type: concat  # concat matches multi-order enhancement; gated is available as an ablation
    use_coords: False
    sequence_layer: torch  # torch is dependency-free; set mamba2 only if Mamba2 is installed
    d_state: 64
    d_conv: 4
    expand: 2
    max_instances: 4096  # 0/null disables token sampling
    sampling: uniform  # uniform, random, or head
    optimizer:
        which: adam
        adam_config:
            lr: 0.0002
            weight_decay: 0.00001
        adamw_config:
            lr: 0.0002
            weight_decay: 0.00001
    criterion: ce
    scheduler:
        warmup: 2
        which: step
        step_config:
            step_size: 3
            gamma: 0.9
        multi_step_config:
            milestones: [20, 30, 40]
            gamma: 0.9
        exponential_config:
            gamma: 0.9
        cosine_config:
            T_max: 10
            eta_min: 0.0001


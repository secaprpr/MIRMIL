General:
    MODEL_NAME: OT_MIL
    seed: 2024
    num_classes: 2
    num_epochs: 50
    device: 0
    num_workers: 4
    best_model_metric: macro_auc
    earlystop:
        use: True
        patience: 10
        metric: macro_auc

Dataset:
    DATASET_NAME: your_dataset_name
    dataset_csv_path: /path/to/your/dataset.csv
    balanced_sampler:
        use: False
        replacement: True

Logs:
    log_root_dir: /path/to/your/log_dir

Model:
    in_dim: 1024
    hidden_dim: 256
    num_prototypes: 16
    prototype_rank_dim: 0
    dropout: 0.1
    max_instances: 4096
    sampling: random

    # Generalized Sinkhorn parameters for unbalanced OT.
    sinkhorn_iterations: 20
    epsilon: 0.1
    tau_source: 0.5
    tau_target: 0.5

    # Minimal sufficient submeasure objective.
    gate_temperature: 0.5
    # 0 preserves the learned global threshold. Values in (0, 1) initialize
    # each bag's soft threshold at the corresponding evidence quantile.
    selection_fraction: 0.0
    # Optional discriminative instance evidence pooled inside the OT gate.
    # A zero weight exactly preserves the prototype-submeasure classifier.
    instance_evidence_weight: 0.0
    instance_evidence_temperature: 1.0
    # Binary rare-lesion branch. Disabled by default for legacy compatibility.
    rare_instance_weight: 0.0
    rare_instance_topk: 32
    rare_instance_temperature: 1.0
    rare_gate_weight: 0.0
    # OT-MIL v2: preserve transported mass in the selected submeasure and
    # learn a discriminative log-likelihood correction to the UOT mass prior.
    mass_faithful_transport: False
    learned_evidence_gate: False
    evidence_gate_weight: 1.0
    class_conditional_gate: False
    residual_evidence_logits: False
    binary_likelihood_ratio: False
    binary_common_gate_weight: 0.0
    binary_common_gate_penalty_weight: 0.0
    binary_common_gate_balance_power: 0.0
    binary_common_gate_learnable_scale: False
    necessity_log_probability: False
    complement_uniformity_weight: 0.0
    necessity_margin: 1.0
    necessity_weight: 0.1
    minimality_weight: 0.01
    diversity_weight: 0.01
    full_classification_weight: 0.25
    consistency_weight: 0.05
    regularization_warmup_epochs: 5

    criterion: ce
    optimizer:
        which: adamw
        adam_config:
            lr: 0.0002
            weight_decay: 0.00001
        adamw_config:
            lr: 0.0002
            weight_decay: 0.00001
    scheduler:
        warmup: 2
        which: cosine
        step_config:
            step_size: 10
            gamma: 0.5
        multi_step_config:
            milestones: [20, 35]
            gamma: 0.5
        exponential_config:
            gamma: 0.95
        cosine_config:
            T_max: 48
            eta_min: 0.000001

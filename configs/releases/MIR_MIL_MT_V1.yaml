Release:
    name: MIR_MIL_MT_V1
    architecture: MIR-MIL with moment-token readout
    status: frozen
    frozen_on: '2026-07-14'
    recommended_feature: UNI
    seeds: [2024, 2025, 2026]
    selection_metric: macro_auc
    primary_prediction: equal_probability_seed_ensemble
    calibration: report_separately

General:
    MODEL_NAME: MIR_MIL
    experiment_variant: MIR_MIL_MT_V1
    seed: 2024
    num_classes: 2
    num_epochs: 30
    device: 0
    num_workers: 4
    best_model_metric: macro_auc
    earlystop:
        use: True
        patience: 8
        metric: macro_auc
        min_delta: 0.0

Dataset:
    DATASET_NAME: your_dataset_name
    dataset_csv_path: /path/to/your/dataset.csv
    balanced_sampler:
        use: True
        replacement: True
        strategy: weighted
        samples_per_class: 0

Logs:
    log_root_dir: /path/to/your/log_dir

Tracking:
    wandb:
        enabled: False
        project: MIR-MIL
        entity: null
        mode: online
        tags: [stage:pilot]
        feature: unknown
        variant: MIR_MIL_MT_V1
        protocol: frozen-release
        split_id: unspecified
        comparison_id: null
        source_manifest_sha256: null
        feature_manifest_sha256: null
        coordinate_manifest_sha256: null
        encoder_checkpoint_sha256: null
        upload_checkpoints: False
        max_artifact_mb: 50

Model:
    in_dim: 1024
    coordinate_dim: 0
    coordinate_encoder_scale: 1.0
    input_group_l2_normalize: False
    input_group_size: 0
    hidden_dim: 256
    sketch_dim: 128
    moment_order: 1
    num_tail_scores: 8
    tail_temperature: 0.25
    num_local_routes: 12
    local_route_dim: 32
    local_route_temperature: 0.25
    anchor_route_dim: 0
    anchor_route_temperature: 1.0
    anchor_route_identity: False
    potential_hidden_dim: 128
    dropout: 0.1
    act: gelu
    max_instances: 4096
    sampling: random

    stability_weight: 0.1
    patch_dropout: 0.1
    feature_noise_std: 0.01
    coordinate_jitter_std: 0.01
    lipschitz_weight: 0.0
    lipschitz_target: 1.0
    lipschitz_samples: 64
    ordinal_weight: 0.0
    potential_type: adaptive_multiscale
    multiscale_gate_initial_bias: -0.5
    multiscale_local_initial_scale: 0.5
    multiscale_class_mix_initial: 0.5
    multiscale_class_residual_initial_scale: 0.05
    multiscale_prototype_initial_scale: 0.05
    anchor_global_initial_scale: 0.1
    anchor_local_initial_scale: 0.1
    prototype_embedding_dim: 64
    prototypes_per_class: 4
    prototype_temperature: 0.2
    prototype_mixture_temperature: 1.0
    prototype_regularization_weight: 0.01
    prototype_diversity_margin: 0.2
    prototype_separation_margin: 0.0
    prototype_residual_initial_scale: 0.0
    evidence_weight: 0.0
    evidence_query_dim: 64
    evidence_value_dim: 128
    evidence_temperature: 1.0
    evidence_dropout: 0.0
    multi_token_weight: 0.0
    multi_token_count: 4
    multi_token_dim: 64
    multi_token_readout_dim: 128
    multi_token_temperature: 1.0
    multi_token_dropout: 0.0
    multi_token_gated: False
    multi_token_gate_hidden_dim: 64
    multi_token_gate_initial_bias: 0.0
    moment_token_weight: 0.1
    moment_token_count: 4

        which: adamw
        adam_config:
            lr: 0.0002
            weight_decay: 0.00001
        adamw_config:
            lr: 0.0002
            weight_decay: 0.00001
    scheduler:
        warmup: 2
        which: cosine
        step_config:
            step_size: 10
            gamma: 0.5
        multi_step_config:
            milestones: [20, 35]
            gamma: 0.5
        exponential_config:
            gamma: 0.95
        cosine_config:
            T_max: 28
            eta_min: 0.000001
            clamp_after_t_max: False
